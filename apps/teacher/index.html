    <title>Review Arcade | RCNR</title>
      <script>(function(){try{var c=document.cookie.match(/(?:^|; )rcnr-theme=([^;]+)/);var t=c?c[1]:null;if(t!=="light"&&t!=="dark"){t=localStorage.getItem("rcnr-theme");if(t==="light"||t==="dark"){var d=location.hostname;var dm=d.endsWith(".rcnr.net")||d==="rcnr.net"?"; domain=.rcnr.net":"";document.cookie="rcnr-theme="+t+"; path=/; max-age=31536000; SameSite=Lax"+dm;localStorage.removeItem("rcnr-theme")}else{t=window.matchMedia("(prefers-color-scheme:light)").matches?"light":null}}if(t==="light"||t==="dark"){document.documentElement.setAttribute("data-theme",t)}}catch(e){}})()</script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
